# Configuração do projeto Supabase (CLI).
# Projetos novos usam JWT de usuário com algoritmo ES256; o gateway das Edge Functions
# pode retornar UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM se verify_jwt estiver ativo.
# Desativamos a verificação no edge e mantemos a validação dentro de cada função (getUser / RLS).
# Ver: https://supabase.com/docs/guides/functions/function-configuration

