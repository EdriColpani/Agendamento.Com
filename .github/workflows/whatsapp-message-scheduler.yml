name: WhatsApp Message Scheduler (1/min)

on:
  schedule:
    # Redundancia operacional: GitHub a cada 5 min como backup do pg_cron.
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Call Supabase Edge Function
        env:
          WHATSAPP_CRON_SECRET: ${{ secrets.WHATSAPP_CRON_SECRET }}
        run: |
          if [ -z "${WHATSAPP_CRON_SECRET}" ]; then
            echo "Missing GitHub secret: WHATSAPP_CRON_SECRET"
            exit 1
          fi

          curl -sS --fail --retry 3 --retry-delay 10 --connect-timeout 10 --max-time 30 -X POST \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${WHATSAPP_CRON_SECRET}" \
            -d '{"source":"github_schedule_backup","min_gap_minutes":4}' \
            "https://ocawpokndruxakzmhzsa.supabase.co/functions/v1/whatsapp-message-scheduler"

