name: WhatsApp Health Alert

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Check health and send alert webhook
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          WHATSAPP_ALERT_WEBHOOK_URL: ${{ secrets.WHATSAPP_ALERT_WEBHOOK_URL }}
          WORKER_STALE_MINUTES: "10"
          PENDING_DUE_CRITICAL: "3"
        run: |
          node <<'EOF'
          const supabaseUrl = process.env.SUPABASE_URL;
          const serviceRoleKey = process.env.SUPABASE_SERVICE_ROLE_KEY;
          const webhookUrl = process.env.WHATSAPP_ALERT_WEBHOOK_URL;
          const staleThreshold = Number(process.env.WORKER_STALE_MINUTES || '10');
          const pendingCritical = Number(process.env.PENDING_DUE_CRITICAL || '3');

          if (!supabaseUrl || !serviceRoleKey) {
            console.error('Missing required secrets: SUPABASE_URL and/or SUPABASE_SERVICE_ROLE_KEY');
            process.exit(1);
          }

          const headers = {
            apikey: serviceRoleKey,
            Authorization: `Bearer ${serviceRoleKey}`,
            'Content-Type': 'application/json',
          };

          const now = new Date();
          const nowIso = now.toISOString();

          async function fetchJson(url, options = {}) {
            const res = await fetch(url, options);
            const body = await res.text();
            if (!res.ok) {
              throw new Error(`HTTP ${res.status} on ${url}: ${body}`);
            }
            return body ? JSON.parse(body) : null;
          }

          async function getLastWorkerExecution() {
            const url = `${supabaseUrl}/rest/v1/worker_execution_logs?select=execution_time,status&order=execution_time.desc&limit=1`;
            const rows = await fetchJson(url, { headers });
            return Array.isArray(rows) && rows.length > 0 ? rows[0] : null;
          }

          async function getPendingDueCount() {
            const url = `${supabaseUrl}/rest/v1/message_send_log?select=id&channel=eq.WHATSAPP&status=eq.PENDING&scheduled_for=lte.${encodeURIComponent(nowIso)}`;
            const res = await fetch(url, {
              headers: {
                ...headers,
                Prefer: 'count=exact',
                Range: '0-0',
              },
            });
            if (!res.ok) {
              const body = await res.text();
              throw new Error(`HTTP ${res.status} on pending_due_count: ${body}`);
            }
            const contentRange = res.headers.get('content-range') || '0-0/0';
            const total = Number(contentRange.split('/')[1] || '0');
            return Number.isFinite(total) ? total : 0;
          }

          async function getOldestPendingDueMinutes() {
            const url = `${supabaseUrl}/rest/v1/message_send_log?select=scheduled_for&channel=eq.WHATSAPP&status=eq.PENDING&scheduled_for=lte.${encodeURIComponent(nowIso)}&order=scheduled_for.asc&limit=1`;
            const rows = await fetchJson(url, { headers });
            const oldest = Array.isArray(rows) && rows.length > 0 ? rows[0]?.scheduled_for : null;
            if (!oldest) return 0;
            const diffMs = now.getTime() - new Date(oldest).getTime();
            return Math.max(0, Math.floor(diffMs / 60000));
          }

          function buildHealth(lastExecution, pendingDue, oldestPendingDueMinutes) {
            const lastExecutionTime = lastExecution?.execution_time || null;
            const staleMinutes = lastExecutionTime
              ? Math.floor((now.getTime() - new Date(lastExecutionTime).getTime()) / 60000)
              : null;
            const isStale = staleMinutes !== null ? staleMinutes >= staleThreshold : true;
            const isBacklogCritical = pendingDue >= pendingCritical;
            const critical = isStale || isBacklogCritical;

            return {
              critical,
              staleMinutes,
              pendingDue,
              oldestPendingDueMinutes,
              lastWorkerStatus: lastExecution?.status || 'NO_RUN',
              lastWorkerExecutionTime: lastExecutionTime,
              staleThreshold,
              pendingCritical,
            };
          }

          async function sendWebhook(payload) {
            if (!webhookUrl) {
              console.warn('WHATSAPP_ALERT_WEBHOOK_URL is not set. Skipping webhook send.');
              return;
            }
            const res = await fetch(webhookUrl, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload),
            });
            if (!res.ok) {
              const body = await res.text();
              throw new Error(`Webhook failed HTTP ${res.status}: ${body}`);
            }
          }

          (async () => {
            const [lastExecution, pendingDue, oldestPendingDueMinutes] = await Promise.all([
              getLastWorkerExecution(),
              getPendingDueCount(),
              getOldestPendingDueMinutes(),
            ]);

            const health = buildHealth(lastExecution, pendingDue, oldestPendingDueMinutes);
            console.log('WhatsApp health snapshot:', health);

            if (!health.critical) {
              console.log('Health OK. No alert sent.');
              return;
            }

            await sendWebhook({
              source: 'github_whatsapp_health_monitor',
              severity: 'critical',
              message: 'WhatsApp automation health is critical.',
              timestamp: nowIso,
              health,
            });

            console.log('Critical health alert sent.');
          })().catch((err) => {
            console.error('Health monitor failed:', err);
            process.exit(1);
          });
          EOF

